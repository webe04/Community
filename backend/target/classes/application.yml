spring:
  datasource:
    url: jdbc:mysql://localhost:3306/community?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver

  web:
    resources:
      static-locations: classpath:/static/,file:./uploads/
      cache:
        period: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
server:
  port: 9090

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.community.entity
  configuration:
    map-underscore-to-camel-case: true
  type-handlers-package: com.example.community.handler